<html lang="zh-CN">
<head>

    <style>
        /* 阿里妈妈东方大楷字体声明 */
        @font-face {
            font-family: 'AlimamaDongFangDaKai';
            src: url('fonts/AlimamaDongFangDaKai-Regular.otf') format('opentype'),
                 url('fonts/AlimamaDongFangDaKai-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AlimamaDongFangDaKai', "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
        }

        /* 国风主色调：浅米色背景 + 原木色系文字 */
        body {
            background-color: #f9f7f3;
            color: #5a4b38;
            line-height: 1.6;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 上模块 - 标题区 */
        .header-section {
            text-align: center;
            padding: 25px 20px;
            margin-bottom: 30px;
        }

        .title-a {
            font-size: 3rem;
            color: #5a4b38;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .title-b {
            font-size: 1.5rem;
            color: #8a7d6b;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* 中模块 - 组队区 */
        .team-section {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px 20px;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.3s ease;
        }

        .team-section:hover {
            box-shadow: 0 4px 16px rgba(128, 107, 83, 0.1);
        }

        .team-title {
            font-size: 1.8rem;
            color: #5a4b38;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            position: relative;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .team-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c9b89f, #9a8868, #c9b89f, transparent);
            border-radius: 2px;
        }

        /* 组队区块容器 */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        /* 组队区块样式 */
        .team-block {
            width: 100%;
            max-width: 280px;
            min-height: 180px;
            background-color: #f8f5ef;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #e0d8c8;
        }

        .team-block:hover {
            background-color: #f0ebe0;
            border-color: #c9b89f;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(128, 107, 83, 0.15);
        }

        /* 纯文字图标样式 */
        .block-icon {
            font-size: 3rem;
            color: #8a7d6b;
            margin-bottom: 8px;
            font-weight: 400;
            font-family: 'AlimamaDongFangDaKai', "SimHei", "Microsoft YaHei", sans-serif;
            line-height: 1;
        }

        /* 区块标题和文本 */
        .block-title {
            font-size: 1.1rem;
            color: #5a4b38;
            margin-bottom: 6px;
            font-weight: 400;
            line-height: 1.3;
            text-align: center;
        }

        .block-text {
            font-size: 0.85rem;
            color: #8a7d6b;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        /* 新建队伍按钮特殊样式 */
        .create-team {
            background-color: #9a8868;
            color: white;
            border: none;
        }

        .create-team:hover {
            background-color: #867352;
            color: white;
        }

        .create-team .block-title,
        .create-team .block-text {
            color: white;
        }

        .create-team .block-icon {
            color: white;
        }

        /* 进度模块样式 */
        .progress-module {
            width: 100%;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(90, 75, 56, 0.1);
        }

        .progress-label {
            font-size: 0.75rem;
            color: #8a7d6b;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .progress-bar-container {
            width: 80%;
            height: 6px;
            background-color: #e0d8c8;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #9a8868, #c9b89f);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 0.65rem;
            color: #8a7d6b;
            font-weight: 400;
            margin-top: 1px;
        }

        /* 新建队伍的特殊进度样式 */
        .create-team .progress-label,
        .create-team .progress-text {
            color: rgba(255, 255, 255, 0.8);
        }

        .create-team .progress-bar-container {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .create-team .progress-bar {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.8));
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .progress-module {
                margin-top: 8px;
            }
            
            .progress-label {
                font-size: 0.75rem;
            }
            
            .progress-text {
                font-size: 0.65rem;
            }
        }

        /* 下模块 - 图片展示区 */
        .image-section {
            background-color: #fff;
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .image-card {
            background-color: #f8f5ef;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 500px;
            min-height: 140px;
            flex: 1;
            cursor: pointer;
            border: 1px solid #e0d8c8;
            display: flex;
            flex-direction: column;
        }

        .image-card:hover {
            background-color: #f0ebe0;
            border-color: #c9b89f;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(128, 107, 83, 0.15);
        }

        /* 卡片图片区域 */
        .card-image-container {
            width: 100%;
            height: 120px;
            background-color: #f8f5ef;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #e0d8c8;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(248, 245, 239, 0.9);
            color: #5a4b38;
            font-size: 1.8rem;
            font-weight: 400;
            font-family: 'AlimamaDongFangDaKai', "SimHei", "Microsoft YaHei", sans-serif;
            letter-spacing: 2px;
            line-height: 1;
        }

        /* 卡片内容区域 */
        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

            line-height: 1.4;
        }

        /* 隐藏编辑和保存按钮 */
        .save-btn, .edit-btn {
            display: none;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header-section {
                padding: 25px 0;
                margin-bottom: 15px;
            }
            
            .team-section {
                padding: 15px 10px;
                margin-bottom: 20px;
            }
            
            .team-title {
                margin-bottom: 15px;
                padding-bottom: 8px;
            }
            
            .title-a {
                font-size: 2rem;
                letter-spacing: 4px;
            }

            .title-b {
                font-size: 1.2rem;
            }

            .team-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }

            .team-block {
                min-height: 160px;
                padding: 15px;
            }

            .block-icon {
        @media (max-width: 768px) {
            .image-section {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .image-card {
                max-width: 100%;

            }
            
            .card-image-container {
                height: 100px;
            }
            
            .image-text-overlay {

            }

                padding: 12px;

        @media (max-width: 480px) {
            .title-a {
                font-size: 1.8rem;
            }
            
            .team-grid {
                grid-template-columns: 1fr;

            }

                min-height: 140px;

            }
            
            .block-text {
                font-size: 0.8rem;
                margin-bottom: 6px;
            }
            
            .progress-module {
                margin-top: 8px;
        @media (max-width: 480px) {
            .image-section {
                gap: 12px;
            }
            
            .image-card {
                min-height: 100px;
            }
            
            .card-image-container {
                height: 80px;
            }
            
            .image-text-overlay {
                font-size: 1.2rem;

            }
            
            .card-content {
                padding: 10px;

            }
            
            .caption-input {
                font-size: 0.8rem;
                padding: 5px 0;

        }    </style>
</head>

                </div>

                    <div class="caption-container">
                        <input type="text" id="caption-input-2" class="caption-input" value="毕业进度计算器" disabled readonly>
                    </div>
                </div>
            </div>        </section>
        
        <!-- 调试区域（仅在开发时显示） -->
        <div style="margin-top: 20px; text-align: center; padding: 10px; background: #f0f0f0; border-radius: 5px;">

                手动刷新进度
            </button>
            <button onclick="testSupabaseConnection()" style="padding: 5px 10px; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">

    <script>
        // 页面导航函数
        function navigateTo(url) {
            window.location.href = url;
        }

        // 卡片点击跳转功能
        document.addEventListener('DOMContentLoaded', function() {
            // 卡片1：当期公告更新 - 点击后在新窗口中打开公告链接
            const announcementCard = document.getElementById('announcement-card');
            if (announcementCard) {
                announcementCard.addEventListener('click', function() {
                    window.open('https://www.yysls.cn/news/update/20260312/40412_1290804.html', '_blank');
                });
            }
            
            // 卡片2：毕业计算工具 - 点击后在新窗口中打开计算器链接
            const calculatorCard = document.getElementById('calculator-card');
            if (calculatorCard) {
                calculatorCard.addEventListener('click', function() {
                    window.open('http://spongem.com/yysls/', '_blank');
                });
            }

            // 添加键盘导航支持
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' && event.target.classList.contains('team-block')) {
                    event.target.click();
                }
            });

            // 添加触摸设备优化
            if ('ontouchstart' in window) {
                document.querySelectorAll('.team-block, .image-card').forEach(element => {
                    element.style.cursor = 'pointer';
                });
            }
        });

        // 错误处理函数
        function handleError(error, context) {
            console.error(`页面错误 (${context}):`, error);
            // 可以在这里添加用户友好的错误提示
        }

        // Supabase客户端配置
        const SUPABASE_URL = 'https://jtxbzkfnpbrjmlqinogj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0K0RV2KcU7DkuSxF9t73dA_a8pIZnB3';
        
        // 连接配置参数
        const CONNECTION_CONFIG = {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            },
            realtime: {
                params: {
                    eventsPerSecond: 10
                }
            },
            global: {
                headers: {
                    'x-application-name': 'teaming-app'
                }
            }
        };
        
        // 连接状态管理
        let connectionState = {
            isConnected: false,
            lastConnectionTime: null,
            retryCount: 0,
            maxRetries: 3,
            baseTimeout: 3000,
            currentTimeout: 3000
        };
        
        // 初始化Supabase客户端
        let supabase;
        
        function initializeSupabaseClient() {
            if (window.supabase && window.supabase.createClient) {
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, CONNECTION_CONFIG);
                    
                    // 简化连接状态管理：假设连接成功，通过实际查询来验证
                    connectionState.isConnected = true;
                    connectionState.lastConnectionTime = new Date();
                    connectionState.retryCount = 0;
                    
                    console.log('Supabase客户端初始化成功');
                    return true;
                } catch (error) {
                    console.error('Supabase客户端初始化失败:', error);
                    return false;
                }
            } else {
                console.error('Supabase客户端未加载，请检查script标签是否正确引入');
                return false;
            }
        }
        
        // 处理连接丢失
        function handleConnectionLoss() {
            console.warn('Supabase连接丢失，尝试重新初始化...');
            connectionState.isConnected = false;
            
            // 使用降级方案
            useFallbackClient();
        }
        
        // 降级方案：使用模拟客户端
        function useFallbackClient() {
            console.warn('使用模拟Supabase客户端，数据库操作不会生效');
            supabase = {
                from: () => ({ 
                    select: () => ({ 
                        eq: () => {
                            return Promise.resolve({ data: [], error: { message: '连接失败，使用模拟数据' } });
                        } 
                    }) 
                })
            };
        }
        
        // 初始化客户端
        const initSuccess = initializeSupabaseClient();
        if (!initSuccess) {
            useFallbackClient();
        }
        
        // 网络状态检测
        window.addEventListener('online', () => {
            console.log('网络连接恢复，尝试重新连接Supabase...');
            if (!connectionState.isConnected) {
                initializeSupabaseClient();
            }
        });
        
        window.addEventListener('offline', () => {
            console.warn('网络连接断开');
        });

        // 进度管理功能
        const teamProgress = {
            // 队伍进度数据
            xiaomen: { current: 0, max: 10 },
            qianyao: { current: 0, max: 10 },
            bige: { current: 0, max: 10 },
            liuzi: { current: 0, max: 10 },
            'new-team': { current: 0, max: 10 }
        };

        // 从数据库获取队员数量（简化版本）
        async function getTeamMemberCount(teamName) {
            try {
                console.log(`开始查询${teamName}队伍的队员数量...`);
                
                // 使用Supabase客户端查询对应队伍的队员数量
                const { data: members, error } = await supabase
                    .from('team_members')
                    .select('*')
                    .eq('team_key', teamName);
                
                if (error) {
                    console.error(`数据库查询错误: ${error.message}`);
                    return 0;
                }
                
                console.log(`查询到${teamName}队伍数据:`, members);
                
                // 统计有实际填写内容的队员数量
                const validMembers = members.filter(member => {
                    // 智能过滤条件：检查记录是否有实际内容
                    const hasValidName = member.member_name && 
                                      member.member_name.trim() !== '';
                    
                    const hasValidPosition = member.position_id && 
                                           member.position_id.trim() !== '';
                    
                    const hasValidTeamKey = member.team_key && 
                                          member.team_key.trim() !== '';
                    
                    return hasValidName || hasValidPosition || hasValidTeamKey;
                });
                
                console.log(`${teamName}队伍有效队员数量:`, validMembers.length);
                
                // 为所有队伍都加上队长的固定计数
                let finalCount = validMembers.length;
                
                // 各队伍的队长固定计数
                const teamCaptains = {
                    'xiaomen': '萧司余',
                    'qianyao': '千瑶',
                    'bige': '比格',
                    'liuzi': '留子'
                };
                
                if (teamCaptains[teamName]) {
                    console.log(`${teamName}队伍检测到，为队长${teamCaptains[teamName]}添加固定计数 +1`);
                    finalCount = validMembers.length + 1;
                }
                
                console.log(`${teamName}队伍查询成功，队员数量: ${finalCount}`);
                return finalCount;
                
            } catch (error) {
                console.error(`查询${teamName}队伍失败:`, error.message);
                return 0;
            }
        }

        // 从本地存储加载进度数据
        async function loadProgressFromStorage() {
            try {
                console.log('开始加载进度数据...');
                
                // 首先从本地存储加载缓存数据
                const savedProgress = localStorage.getItem('teamProgress');
                if (savedProgress) {
                    const parsedProgress = JSON.parse(savedProgress);
                    Object.keys(teamProgress).forEach(team => {
                        if (parsedProgress[team]) {
                            teamProgress[team].current = parsedProgress[team].current || 0;
                            console.log(`从缓存加载${team}队伍进度: ${teamProgress[team].current}`);
                        }
                    });
                }
                
                // 从数据库获取实际队员数量并更新进度
                const teams = ['xiaomen', 'qianyao', 'bige', 'liuzi'];
                for (const team of teams) {
                    try {
                        console.log(`开始查询${team}队伍数据库数据...`);
                        const actualCount = await getTeamMemberCount(team);
                        console.log(`${team}队伍数据库查询结果: ${actualCount}名队员`);
                        
                        teamProgress[team].current = actualCount;
                        updateProgressDisplay(team);
                        
                        console.log(`${team}队伍进度已更新: ${teamProgress[team].current}/${teamProgress[team].max}`);
                    } catch (teamError) {
                        console.error(`查询${team}队伍数据失败:`, teamError.message);
                        // 单个队伍查询失败不影响其他队伍
                    }
                }
                
                // 保存更新后的进度数据
                saveProgressToStorage();
                console.log('进度数据加载完成');
                
            } catch (error) {
                console.error('加载进度数据失败:', error);
                // 即使失败也要确保进度条有默认显示
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
            }
        }

        // 保存进度数据到本地存储
        function saveProgressToStorage() {
            try {
                localStorage.setItem('teamProgress', JSON.stringify(teamProgress));
            } catch (error) {
                console.error('保存进度数据失败:', error);
            }
        }

        // 更新进度显示
        function updateProgressDisplay(team) {
            const progressBar = document.getElementById(`${team}-progress-bar`);
            const progressText = document.getElementById(`${team}-progress-text`);
            
            if (progressBar && progressText) {
                const progress = teamProgress[team];
                const percentage = (progress.current / progress.max) * 100;
                
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `${progress.current}/${progress.max}`;
                
                // 根据进度值添加不同的颜色效果
                if (progress.current >= progress.max) {
                    progressBar.style.background = 'linear-gradient(90deg, #4CAF50, #66BB6A)';
                } else if (progress.current >= progress.max * 0.7) {
                    progressBar.style.background = 'linear-gradient(90deg, #FF9800, #FFB74D)';
                } else {
                    progressBar.style.background = 'linear-gradient(90deg, #9a8868, #c9b89f)';
                }
            }
        }

        // 更新队伍进度
        function updateTeamProgress(team, action) {
            if (!teamProgress[team]) return;
            
            const progress = teamProgress[team];
            
            if (action === 'add' && progress.current < progress.max) {
                progress.current++;
            } else if (action === 'remove' && progress.current > 0) {
                progress.current--;
            }
            
            updateProgressDisplay(team);
            saveProgressToStorage();
            
            console.log(`队伍 ${team} 进度更新: ${progress.current}/${progress.max}`);
        }

        // 监听来自其他页面的进度更新消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'progressUpdate') {
                const { team, action } = event.data;
                if (team && action) {
                    updateTeamProgress(team, action);
                }
            }
        });

        // 页面加载完成后的初始化
        window.addEventListener('load', async function() {
            try {
                // 加载进度数据（异步）
                await loadProgressFromStorage();
                
                // 更新所有队伍的进度显示
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
                
                // 检查关键元素是否存在
                const requiredElements = [
                    'announcement-card',
                    'calculator-card'
                ];

                requiredElements.forEach(elementId => {
                    if (!document.getElementById(elementId)) {
                        console.warn(`缺少必要元素: ${elementId}`);
                    }
                });

                console.log('页面初始化完成，进度模块已加载');
            } catch (error) {
                handleError(error, '页面初始化');
            }
        });

        // 提供全局函数供其他页面调用
        window.updateTeamProgress = updateTeamProgress;
        
        // 调试函数：手动刷新所有队伍进度
        window.refreshAllProgress = async function() {
            console.log('手动刷新所有队伍进度...');
            try {
                await loadProgressFromStorage();
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
                console.log('手动刷新完成');
            } catch (error) {
                console.error('手动刷新失败:', error);
            }
        };
        
        // 测试函数：验证进度条功能
        window.testProgressBars = function() {
            console.log('=== 开始测试进度条功能 ===');
            
            const teams = ['xiaomen', 'qianyao', 'bige', 'liuzi', 'new-team'];
            
            teams.forEach(team => {
                console.log(`\n测试${team}队伍进度条:`);
                
                // 检查元素是否存在
                const progressBar = document.getElementById(`${team}-progress-bar`);
                const progressText = document.getElementById(`${team}-progress-text`);
                
                console.log(`进度条元素: ${progressBar ? '存在' : '不存在'}`);
                console.log(`进度文本元素: ${progressText ? '存在' : '不存在'}`);
                
                if (progressBar && progressText) {
                    console.log(`当前进度条宽度: ${progressBar.style.width}`);
                    console.log(`当前进度文本: ${progressText.textContent}`);
                    console.log(`队伍数据: ${teamProgress[team].current}/${teamProgress[team].max}`);
                }
            });
            
            console.log('=== 进度条功能测试结束 ===');
        };
        
        // 新增：简单测试函数，模拟一些进度数据
        window.simulateProgress = function() {
            console.log('=== 开始模拟进度数据 ===');
            
            // 模拟一些进度数据
            teamProgress.xiaomen.current = 3;
            teamProgress.qianyao.current = 5;
            teamProgress.bige.current = 2;
            teamProgress.liuzi.current = 4;
            teamProgress['new-team'].current = 1;
            
            // 更新所有进度显示
            Object.keys(teamProgress).forEach(team => {
                updateProgressDisplay(team);
            });
            
            console.log('进度数据已模拟，请查看页面上的进度条是否更新');
            console.log('=== 模拟进度数据结束 ===');
        };
        
        // 调试函数：测试Supabase连接性能
        window.testSupabaseConnection = async function() {
            console.log('=== 开始详细测试Supabase连接性能 ===');
            console.log('Supabase URL:', SUPABASE_URL);
            console.log('当前连接状态:', connectionState);
            console.log('网络状态:', navigator.onLine ? '在线' : '离线');
            
            if (supabase && supabase.from) {
                console.log('Supabase客户端功能正常');
                
                // 测试连接延迟
                const startTime = performance.now();
                try {
                    // 尝试一个简单的查询来测试连接
                    const { data, error, count } = await supabase
                        .from('team_members')
                        .select('*', { count: 'exact', head: true })
                        .limit(1);
                    
                    const endTime = performance.now();
                    const latency = endTime - startTime;
                    
                    console.log(`连接延迟: ${latency.toFixed(2)}ms`);
                    
                    if (error) {
                        console.error('Supabase连接测试失败:', error);
                        console.log('错误详情:', {
                            message: error.message,
                            details: error.details,
                            hint: error.hint
                        });
                    } else {
                        console.log('Supabase连接测试成功');
                        console.log('查询结果:', { data, count });
                        console.log('连接状态: 正常');
                    }
                    
                    // 测试连接稳定性（多次查询）
                    console.log('\n=== 开始连接稳定性测试 ===');
                    const stabilityResults = [];
                    for (let i = 1; i <= 3; i++) {
                        const testStart = performance.now();
                        try {
                            const { error: testError } = await supabase
                                .from('team_members')
                                .select('id')
                                .limit(1);
                            
                            const testEnd = performance.now();
                            const testLatency = testEnd - testStart;
                            
                            stabilityResults.push({
                                attempt: i,
                                latency: testLatency,
                                success: !testError,
                                error: testError
                            });
                            
                            console.log(`第${i}次测试: ${testLatency.toFixed(2)}ms - ${testError ? '失败' : '成功'}`);
                            
                        } catch (testError) {
                            stabilityResults.push({
                                attempt: i,
                                latency: null,
                                success: false,
                                error: testError
                            });
                            console.log(`第${i}次测试: 异常 - ${testError.message}`);
                        }
                    }
                    
                    // 分析稳定性结果
                    const successfulTests = stabilityResults.filter(r => r.success);
                    const averageLatency = successfulTests.length > 0 ? 
                        successfulTests.reduce((sum, r) => sum + r.latency, 0) / successfulTests.length : 0;
                    
                    console.log('\n稳定性测试结果:');
                    console.log(`成功率: ${successfulTests.length}/3 (${(successfulTests.length/3*100).toFixed(1)}%)`);
                    console.log(`平均延迟: ${averageLatency.toFixed(2)}ms`);
                    
                } catch (error) {
                    console.error('Supabase连接测试异常:', error);
                }
            } else {
                console.error('Supabase客户端未正确初始化');
            }
            
            console.log('=== Supabase连接性能测试结束 ===');
        };
        
        // 调试函数：测试数据库查询性能
        window.testDatabaseQuery = async function() {
            console.log('=== 开始测试数据库查询性能 ===');
            console.log('当前连接状态:', connectionState);
            
            const teams = ['xiaomen', 'qianyao', 'bige', 'liuzi'];
            const queryResults = [];
            
            for (const team of teams) {
                console.log(`\n=== 测试查询${team}队伍数据 ===`);
                const startTime = performance.now();
                
                try {
                    const count = await getTeamMemberCount(team);
                    const endTime = performance.now();
                    const queryTime = endTime - startTime;
                    
                    queryResults.push({
                        team,
                        count,
                        queryTime,
                        success: true
                    });
                    
                    console.log(`${team}队伍查询结果: ${count}名队员`);
                    console.log(`查询耗时: ${queryTime.toFixed(2)}ms`);
                    
                } catch (error) {
                    const endTime = performance.now();
                    const queryTime = endTime - startTime;
                    
                    queryResults.push({
                        team,
                        count: 0,
                        queryTime,
                        success: false,
                        error: error.message
                    });
                    
                    console.error(`${team}队伍查询失败:`, error.message);
                    console.log(`查询耗时: ${queryTime.toFixed(2)}ms`);
                }
            }
            
            // 性能分析
            console.log('\n=== 查询性能分析 ===');
            const successfulQueries = queryResults.filter(r => r.success);
            const totalTime = queryResults.reduce((sum, r) => sum + r.queryTime, 0);
            const avgTime = queryResults.length > 0 ? totalTime / queryResults.length : 0;
            
            console.log(`总查询次数: ${queryResults.length}`);
            console.log(`成功查询: ${successfulQueries.length}`);
            console.log(`失败查询: ${queryResults.length - successfulQueries.length}`);
            console.log(`总耗时: ${totalTime.toFixed(2)}ms`);
            console.log(`平均查询时间: ${avgTime.toFixed(2)}ms`);
            
            if (successfulQueries.length > 0) {
                const minTime = Math.min(...successfulQueries.map(r => r.queryTime));
                const maxTime = Math.max(...successfulQueries.map(r => r.queryTime));
                console.log(`最快查询: ${minTime.toFixed(2)}ms`);
                console.log(`最慢查询: ${maxTime.toFixed(2)}ms`);
            }
            
            console.log('=== 数据库查询性能测试结束 ===');
        };
        
        // 新增：连接监控函数
        window.monitorConnection = function() {
            console.log('=== 开始连接状态监控 ===');
            console.log('当前连接状态:', connectionState);
            console.log('Supabase实时连接状态:', supabase && supabase.realtime ? '已初始化' : '未初始化');
            
            if (supabase && supabase.realtime) {
                console.log('实时连接状态:', supabase.realtime.isConnected ? supabase.realtime.isConnected() : '未知');
                console.log('订阅数量:', supabase.realtime.channels ? supabase.realtime.channels.length : '不可用');
            }
            
            // 测试网络连接
            fetch('https://jtxbzkfnpbrjmlqinogj.supabase.co/auth/v1/health', {
                method: 'GET',
                mode: 'no-cors'
            }).then(() => {
                console.log('网络连接测试: 成功');
            }).catch(() => {
                console.log('网络连接测试: 失败');
            });
            
            console.log('=== 连接状态监控结束 ===');
        };
        
        
        // 定期刷新进度数据（每30秒）
        setInterval(async () => {
            try {
                await loadProgressFromStorage();
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
                console.log('进度数据已自动刷新');
            } catch (error) {
                console.warn('自动刷新进度数据失败:', error);
            }
        }, 30000);
    </script>
