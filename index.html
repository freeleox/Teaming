<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梳风弄弦音 - 全女百业</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        /* 阿里妈妈东方大楷字体声明 */
        @font-face {
            font-family: 'AlimamaDongFangDaKai';
            src: url('fonts/AlimamaDongFangDaKai-Regular.otf') format('opentype'),
                 url('fonts/AlimamaDongFangDaKai-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AlimamaDongFangDaKai', "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
        }

        /* 国风主色调：浅米色背景 + 原木色系文字 */
        body {
            background-color: #f9f7f3;
            color: #5a4b38;
            line-height: 1.6;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 上模块 - 标题区 */
        .header-section {
            text-align: center;
            padding: 25px 20px;
            margin-bottom: 30px;
        }

        .title-a {
            font-size: 3rem;
            color: #5a4b38;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .title-b {
            font-size: 1.5rem;
            color: #8a7d6b;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* 中模块 - 组队区 */
        .team-section {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px 20px;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.3s ease;
        }

        .team-section:hover {
            box-shadow: 0 4px 16px rgba(128, 107, 83, 0.1);
        }

        .team-title {
            font-size: 1.8rem;
            color: #5a4b38;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            position: relative;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .team-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c9b89f, #9a8868, #c9b89f, transparent);
            border-radius: 2px;
        }

        /* 组队区块容器 */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        /* 组队区块样式 */
        .team-block {
            width: 100%;
            max-width: 280px;
            min-height: 180px;
            background-color: #f8f5ef;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #e0d8c8;
        }

        .team-block:hover {
            background-color: #f0ebe0;
            border-color: #c9b89f;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(128, 107, 83, 0.15);
        }

        /* 纯文字图标样式 */
        .block-icon {
            font-size: 3rem;
            color: #8a7d6b;
            margin-bottom: 8px;
            font-weight: 400;
            font-family: 'AlimamaDongFangDaKai', "SimHei", "Microsoft YaHei", sans-serif;
            line-height: 1;
        }

        /* 区块标题和文本 */
        .block-title {
            font-size: 1.1rem;
            color: #5a4b38;
            margin-bottom: 6px;
            font-weight: 400;
            line-height: 1.3;
            text-align: center;
        }

        .block-text {
            font-size: 0.85rem;
            color: #8a7d6b;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        /* 新建队伍按钮特殊样式 */
        .create-team {
            background-color: #9a8868;
            color: white;
            border: none;
        }

        .create-team:hover {
            background-color: #867352;
            color: white;
        }

        .create-team .block-title,
        .create-team .block-text {
            color: white;
        }

        .create-team .block-icon {
            color: white;
        }

        /* 进度模块样式 */
        .progress-module {
            width: 100%;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(90, 75, 56, 0.1);
        }

        .progress-label {
            font-size: 0.75rem;
            color: #8a7d6b;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .progress-bar-container {
            width: 80%;
            height: 6px;
            background-color: #e0d8c8;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #9a8868, #c9b89f);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 0.65rem;
            color: #8a7d6b;
            font-weight: 400;
            margin-top: 1px;
        }

        /* 新建队伍的特殊进度样式 */
        .create-team .progress-label,
        .create-team .progress-text {
            color: rgba(255, 255, 255, 0.8);
        }

        .create-team .progress-bar-container {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .create-team .progress-bar {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.8));
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .progress-module {
                margin-top: 8px;
            }
            
            .progress-label {
                font-size: 0.75rem;
            }
            
            .progress-text {
                font-size: 0.65rem;
            }
        }

        /* 下模块 - 图片展示区 */
        .image-section {
            background-color: #fff;
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .image-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            width: 100%;
            max-width: 500px;
            min-width: 300px;
            flex: 1;
            cursor: pointer;
        }

        .image-card:hover {
            box-shadow: 0 4px 16px rgba(128, 107, 83, 0.1);
            transform: translateY(-5px);
        }

        /* 卡片图片区域 */
        .card-image-container {
            width: 100%;
            height: 300px;
            background-color: #f8f5ef;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #8a7d6b;
            font-size: 2.5rem;
            font-weight: 400;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-family: 'AlimamaDongFangDaKai', "SimHei", "Microsoft YaHei", sans-serif;
        }

        /* 卡片内容区域 */
        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            color: #5a4b38;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .caption-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .caption-input {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            color: #5a4b38;
            font-weight: 400;
            outline: none;
            background-color: transparent;
            transition: all 0.3s ease;
            font-family: 'AlimamaDongFangDaKai', "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
        }

        /* 隐藏编辑和保存按钮 */
        .save-btn, .edit-btn {
            display: none;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header-section {
                padding: 25px 0;
                margin-bottom: 15px;
            }
            
            .team-section {
                padding: 15px 10px;
                margin-bottom: 20px;
            }
            
            .team-title {
                margin-bottom: 15px;
                padding-bottom: 8px;
            }
            
            .title-a {
                font-size: 2rem;
                letter-spacing: 4px;
            }

            .title-b {
                font-size: 1.2rem;
            }

            .team-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }

            .team-block {
                min-height: 160px;
                padding: 15px;
            }

            .block-icon {
                font-size: 2.8rem;
            }

            .image-section {
                flex-direction: column;
                align-items: center;
            }
            
            .image-card {
                max-width: 100%;
            }
            
            .card-image-container {
                height: 250px;
            }
            
            .caption-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .caption-input {
                width: 100%;
                font-size: 1rem;
                padding: 10px 0;
            }
        }

        @media (max-width: 480px) {
            .title-a {
                font-size: 1.8rem;
            }
            
            .team-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .team-block {
                min-height: 140px;
                padding: 12px;
            }
            
            .block-icon {
                font-size: 2.5rem;
                margin-bottom: 6px;
            }
            
            .block-title {
                font-size: 1rem;
                margin-bottom: 4px;
            }
            
            .block-text {
                font-size: 0.8rem;
                margin-bottom: 6px;
            }
            
            .progress-module {
                margin-top: 8px;
                padding-top: 6px;
            }
            
            .card-image-container {
                height: 200px;
            }
            
            .image-text-overlay {
                font-size: 2rem;
            }
            
            .card-title {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .caption-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 上模块：标题区 -->
        <section class="header-section">
            <h1 class="title-a">梳风弄弦音</h1>

        <!-- 中模块：组队区 - 纯文字图标，无任何图片/图标库 -->
        <section class="team-section">
            <h2 class="team-title">双十激情组队</h2>
            <div class="team-grid">
                <!-- 萧门：跳转到xiaomen.html -->
                <div class="team-block" onclick="navigateTo('xiaomen.html')">

                        <div class="progress-bar-container">
                            <div class="progress-bar" id="xiaomen-progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="xiaomen-progress-text">0/10</div>
                    </div>
                </div>

                <!-- 千瑶：跳转到qianyao.html -->
                <div class="team-block" onclick="navigateTo('qianyao.html')">
                    <div class="block-icon">千</div>
                    <div class="block-title">千瑶</div>
                    <div class="block-text">静音车厢队，社恐福音</div>
                    <div class="progress-module">
                        <div class="progress-label">组队进度</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="qianyao-progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="qianyao-progress-text">0/10</div>
                    </div>
                </div>

                <!-- 比格：跳转到bige.html -->
                <div class="team-block" onclick="navigateTo('bige.html')">
                    <div class="block-icon">比</div>
                    <div class="block-title">比门</div>
                    <div class="block-text">高战妻妻，有话痨纯比</div>
                    <div class="progress-module">
                        <div class="progress-label">组队进度</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="bige-progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="bige-progress-text">0/10</div>
                    </div>
                </div>

                <!-- 留子：跳转到liuzi.html -->
                <div class="team-block" onclick="navigateTo('liuzi.html')">
                    <div class="block-icon">留</div>
                    <div class="block-title">留门</div>
                    <div class="block-text">想你的风还是吹到了英国</div>
                    <div class="progress-module">
                        <div class="progress-label">组队进度</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="liuzi-progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="liuzi-progress-text">0/10</div>
                    </div>
                </div>

                <!-- 新建队伍：跳转到new-team.html + 加号放大 -->
                <div class="team-block create-team" onclick="navigateTo('new-team.html')">
                    <div class="block-icon">+</div>
                    <div class="block-title">我要新建队伍</div>
                    <div class="progress-module">
                        <div class="progress-label">组队进度</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="new-team-progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="new-team-progress-text">0/10</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 下模块：图片展示区 - 横向卡片布局 -->
        <section class="image-section">
            <!-- 卡片1：当期公告更新 -->
            <div class="image-card" id="announcement-card">
                <div class="card-image-container">
                    <div class="image-text-overlay">当期公告更新</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>公告栏</span>
                    </div>
                    <div class="caption-container">
                        <input type="text" id="caption-input-1" class="caption-input" value="2月27日2.5版本「侠情满此宵」更新公告" disabled readonly>
                    </div>
                </div>
            </div>

            <!-- 卡片2：毕业计算工具 -->
            <div class="image-card" id="calculator-card">
                <div class="card-image-container">
                    <div class="image-text-overlay">毕业计算工具</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>计算器</span>
                    </div>
                    <div class="caption-container">
                        <input type="text" id="caption-input-2" class="caption-input" value="装备毕业进度计算器" disabled readonly>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- 调试区域（仅在开发时显示） -->
        <div style="margin-top: 20px; text-align: center; padding: 10px; background: #f0f0f0; border-radius: 5px;">
            <button onclick="refreshAllProgress()" style="padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                手动刷新进度
            </button>
            <button onclick="testSupabaseConnection()" style="padding: 5px 10px; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                测试Supabase连接
            </button>
            <button onclick="testDatabaseQuery()" style="padding: 5px 10px; background: #ffc107; color: black; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                测试数据库查询
            </button>
            <button onclick="debugXiaomenData()" style="padding: 5px 10px; background: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                查看萧门详细数据
            </button>
            <button onclick="simpleCountXiaomen()" style="padding: 5px 10px; background: #6f42c1; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                简单统计萧门记录
            </button>
            <button onclick="deepAnalyzeXiaomen()" style="padding: 5px 10px; background: #fd7e14; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                深度分析萧门数据
            </button>
            <button onclick="testXiaomenProgress()" style="padding: 5px 10px; background: #20c997; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px;">
                测试萧门进度
            </button>
            <div style="margin-top: 10px; font-size: 12px; color: #666;">
                点击测试不同功能模块
            </div>

    <script>
        // 页面导航函数
        function navigateTo(url) {
            window.location.href = url;
        }

        // 卡片点击跳转功能
        document.addEventListener('DOMContentLoaded', function() {
            // 卡片1：当期公告更新 - 点击后在新窗口中打开公告链接
            const announcementCard = document.getElementById('announcement-card');
            if (announcementCard) {
                announcementCard.addEventListener('click', function() {
                    window.open('https://www.yysls.cn/news/update/20260227/40412_1288482.html', '_blank');
                });
            }
            
            // 卡片2：毕业计算工具 - 点击后在新窗口中打开计算器链接
            const calculatorCard = document.getElementById('calculator-card');
            if (calculatorCard) {
                calculatorCard.addEventListener('click', function() {
                    window.open('http://spongem.com/yysls/', '_blank');
                });
            }

            // 添加键盘导航支持
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' && event.target.classList.contains('team-block')) {
                    event.target.click();
                }
            });

            // 添加触摸设备优化
            if ('ontouchstart' in window) {
                document.querySelectorAll('.team-block, .image-card').forEach(element => {
                    element.style.cursor = 'pointer';
                });
            }
        });

        // 错误处理函数
        function handleError(error, context) {
            console.error(`页面错误 (${context}):`, error);
            // 可以在这里添加用户友好的错误提示
        }

        // Supabase客户端配置
        const SUPABASE_URL = 'https://jtxbzkfnpbrjmlqinogj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0K0RV2KcU7DkuSxF9t73dA_a8pIZnB3';
        
        // 初始化Supabase客户端
        let supabase;
        if (window.supabase && window.supabase.createClient) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('Supabase客户端初始化成功');
        } else {
            console.error('Supabase客户端未加载，请检查script标签是否正确引入');
            // 使用模拟客户端，但添加警告
            supabase = {
                from: () => ({ 
                    select: () => ({ 
                        eq: () => {
                            console.warn('使用模拟Supabase客户端，数据库操作不会生效');
                            return Promise.resolve({ data: [], error: null });
                        } 
                    }) 
                })
            };
        }

        // 进度管理功能
        const teamProgress = {
            // 队伍进度数据
            xiaomen: { current: 0, max: 10 },
            qianyao: { current: 0, max: 10 },
            bige: { current: 0, max: 10 },
            liuzi: { current: 0, max: 10 },
            'new-team': { current: 0, max: 10 }
        };

        // 从数据库获取队员数量
        async function getTeamMemberCount(teamName) {
            try {
                console.log(`开始查询${teamName}队伍的队员数量...`);
                console.log('Supabase客户端状态:', supabase ? '已初始化' : '未初始化');
                
                // 使用Supabase客户端查询对应队伍的队员数量
                const { data: members, error } = await supabase
                    .from('team_members')
                    .select('*')
                    .eq('team_key', teamName);
                
                if (error) {
                    console.error(`获取${teamName}队伍队员数量失败:`, error);
                    return 0;
                }
                
                console.log(`查询到${teamName}队伍数据:`, members);
                console.log(`查询条件: team_key = '${teamName}'`);
                
                // 统计有实际填写内容的队员数量
                const validMembers = members.filter(member => {
                    // 智能过滤条件：检查记录是否有实际内容
                    const hasValidName = member.member_name && 
                                      member.member_name !== null && 
                                      member.member_name !== undefined && 
                                      member.member_name.toString().trim() !== '';
                    
                    const hasValidPosition = member.position_id && 
                                           member.position_id !== null && 
                                           member.position_id !== undefined && 
                                           member.position_id.toString().trim() !== '';
                    
                    const hasValidTeamKey = member.team_key && 
                                          member.team_key !== null && 
                                          member.team_key !== undefined && 
                                          member.team_key.toString().trim() !== '';
                    
                    const isValid = hasValidName || hasValidPosition || hasValidTeamKey;
                    
                    if (isValid) {
                        console.log(`有效队员:`, member);
                    } else {
                        console.log(`无效队员（所有字段都为空）:`, member);
                        console.log('  详细检查:', {
                            member_name: member.member_name,
                            position_id: member.position_id,
                            team_key: member.team_key,
                            hasValidName,
                            hasValidPosition,
                            hasValidTeamKey
                        });
                    }
                    
                    return isValid;
                });
                
                console.log(`${teamName}队伍有效队员数量:`, validMembers.length);
                
                // 为所有队伍都加上队长的固定计数
                let finalCount = validMembers.length;
                
                // 各队伍的队长固定计数
                const teamCaptains = {
                    'xiaomen': '萧司余',
                    'qianyao': '千瑶',
                    'bige': '比格',
                    'liuzi': '留子'
                };
                
                if (teamCaptains[teamName]) {
                    console.log(`${teamName}队伍检测到，为队长${teamCaptains[teamName]}添加固定计数 +1`);
                    finalCount = validMembers.length + 1;
                    console.log(`${teamName}队伍最终队员数量: ${validMembers.length} (数据库记录) + 1 (固定队长) = ${finalCount}`);
                }
                
                return finalCount;
            } catch (error) {
                console.error(`获取${teamName}队伍队员数量异常:`, error);
                return 0;
            }
        }

        // 从本地存储加载进度数据
        async function loadProgressFromStorage() {
            try {
                const savedProgress = localStorage.getItem('teamProgress');
                if (savedProgress) {
                    const parsedProgress = JSON.parse(savedProgress);
                    Object.keys(teamProgress).forEach(team => {
                        if (parsedProgress[team]) {
                            teamProgress[team].current = parsedProgress[team].current || 0;
                        }
                    });
                }
                
                // 从数据库获取实际队员数量并更新进度
                const teams = ['xiaomen', 'qianyao', 'bige', 'liuzi'];
                for (const team of teams) {
                    const actualCount = await getTeamMemberCount(team);
                    teamProgress[team].current = actualCount;
                    updateProgressDisplay(team);
                }
                
            } catch (error) {
                console.warn('加载进度数据失败，使用默认值:', error);
            }
        }

        // 保存进度数据到本地存储
        function saveProgressToStorage() {
            try {
                localStorage.setItem('teamProgress', JSON.stringify(teamProgress));
            } catch (error) {
                console.error('保存进度数据失败:', error);
            }
        }

        // 更新进度显示
        function updateProgressDisplay(team) {
            const progressBar = document.getElementById(`${team}-progress-bar`);
            const progressText = document.getElementById(`${team}-progress-text`);
            
            if (progressBar && progressText) {
                const progress = teamProgress[team];
                const percentage = (progress.current / progress.max) * 100;
                
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `${progress.current}/${progress.max}`;
                
                // 根据进度值添加不同的颜色效果
                if (progress.current >= progress.max) {
                    progressBar.style.background = 'linear-gradient(90deg, #4CAF50, #66BB6A)';
                } else if (progress.current >= progress.max * 0.7) {
                    progressBar.style.background = 'linear-gradient(90deg, #FF9800, #FFB74D)';
                } else {
                    progressBar.style.background = 'linear-gradient(90deg, #9a8868, #c9b89f)';
                }
            }
        }

        // 更新队伍进度
        function updateTeamProgress(team, action) {
            if (!teamProgress[team]) return;
            
            const progress = teamProgress[team];
            
            if (action === 'add' && progress.current < progress.max) {
                progress.current++;
            } else if (action === 'remove' && progress.current > 0) {
                progress.current--;
            }
            
            updateProgressDisplay(team);
            saveProgressToStorage();
            
            console.log(`队伍 ${team} 进度更新: ${progress.current}/${progress.max}`);
        }

        // 监听来自其他页面的进度更新消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'progressUpdate') {
                const { team, action } = event.data;
                if (team && action) {
                    updateTeamProgress(team, action);
                }
            }
        });

        // 页面加载完成后的初始化
        window.addEventListener('load', async function() {
            try {
                // 加载进度数据（异步）
                await loadProgressFromStorage();
                
                // 更新所有队伍的进度显示
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
                
                // 检查关键元素是否存在
                const requiredElements = [
                    'announcement-card',
                    'calculator-card'
                ];

                requiredElements.forEach(elementId => {
                    if (!document.getElementById(elementId)) {
                        console.warn(`缺少必要元素: ${elementId}`);
                    }
                });

                console.log('页面初始化完成，进度模块已加载');
            } catch (error) {
                handleError(error, '页面初始化');
            }
        });

        // 提供全局函数供其他页面调用
        window.updateTeamProgress = updateTeamProgress;
        
        // 调试函数：手动刷新所有队伍进度
        window.refreshAllProgress = async function() {
            console.log('手动刷新所有队伍进度...');
            try {
                await loadProgressFromStorage();
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
                console.log('手动刷新完成');
            } catch (error) {
                console.error('手动刷新失败:', error);
            }
        };
        
        // 调试函数：测试Supabase连接
        window.testSupabaseConnection = async function() {
            console.log('=== 开始测试Supabase连接 ===');
            console.log('Supabase URL:', SUPABASE_URL);
            console.log('Supabase客户端状态:', supabase ? '已初始化' : '未初始化');
            
            if (supabase && supabase.from) {
                console.log('Supabase客户端功能正常');
                try {
                    // 尝试一个简单的查询来测试连接
                    const { data, error } = await supabase
                        .from('team_members')
                        .select('count')
                        .limit(1);
                    
                    if (error) {
                        console.error('Supabase连接测试失败:', error);
                    } else {
                        console.log('Supabase连接测试成功');
                        console.log('查询结果:', data);
                    }
                } catch (error) {
                    console.error('Supabase连接测试异常:', error);
                }
            } else {
                console.error('Supabase客户端未正确初始化');
            }
            console.log('=== Supabase连接测试结束 ===');
        };
        
        // 调试函数：测试数据库查询
        window.testDatabaseQuery = async function() {
            console.log('=== 开始测试数据库查询 ===');
            
            const teams = ['xiaomen', 'qianyao', 'bige', 'liuzi'];
            for (const team of teams) {
                console.log(`\n测试查询${team}队伍数据...`);
                const count = await getTeamMemberCount(team);
                console.log(`${team}队伍实际队员数量:`, count);
            }
            
            console.log('=== 数据库查询测试结束 ===');
        };
        
        // 调试函数：详细查看萧门队员数据
        window.debugXiaomenData = async function() {
            console.log('=== 详细查看萧门队员数据 ===');
            
            try {
                const { data: members, error } = await supabase
                    .from('team_members')
                    .select('*')
                    .eq('team_key', 'xiaomen');

                console.log('所有萧门队员数据:', members);
                
                // 详细分析每个队员的字段
                members.forEach((member, index) => {
                    console.log(`\n队员 ${index + 1}:`);
                    console.log('  member_name:', member.member_name, `(${typeof member.member_name})`);
                    console.log('  position_id:', member.position_id, `(${typeof member.position_id})`);
                    console.log('  team_key:', member.team_key, `(${typeof member.team_key})`);
                    console.log('  其他字段:', Object.keys(member).filter(key => !['member_name', 'position_id', 'team_key'].includes(key)));
                    
                    // 检查过滤条件
                    const hasName = member.member_name && member.member_name.trim() !== '';
                    const hasPosition = member.position_id && member.position_id.trim() !== '';

                    console.log('  过滤结果:', {
                        '有名字': hasName,

                        '有队伍': hasTeamKey,
                        '是否有效': hasName || hasPosition || hasTeamKey
                    });
                });
                
            } catch (error) {
                console.error('详细查看萧门数据异常:', error);

            console.log('=== 萧门数据查看结束 ===');
        };
        
        // 调试函数：简单统计所有萧门记录
        window.simpleCountXiaomen = async function() {
            console.log('=== 简单统计萧门记录 ===');
            
            try {
                const { data: members, error } = await supabase
                    .from('team_members')
                    .select('*')
                    .eq('team_key', 'xiaomen');
                
                if (error) {
                    console.error('查询萧门数据失败:', error);
                    return;
                }
                
                console.log(`查询到萧门记录总数:`, members.length);
                console.log('不进行任何过滤，直接返回所有记录数量');
                
                // 简单显示每个记录的基本信息
                members.forEach((member, index) => {
                    console.log(`记录 ${index + 1}:`, {
                        id: member.id,
                        member_name: member.member_name,
                        position_id: member.position_id,
                        team_key: member.team_key
                    });
                });
                
                console.log('=== 简单统计结束 ===');
                return members.length;
                
            } catch (error) {
                console.error('简单统计萧门数据异常:', error);
                return 0;
            }
        };
        
        // 调试函数：深度分析萧门数据问题
        window.deepAnalyzeXiaomen = async function() {
            console.log('=== 深度分析萧门数据问题 ===');
            
            try {
                const { data: members, error } = await supabase
                    .from('team_members')
                    .select('*')
                    .eq('team_key', 'xiaomen');
                
                if (error) {
                    console.error('查询萧门数据失败:', error);
                    return;
                }
                
                console.log(`数据库查询结果:`, members.length, '条记录');
                
                // 分析可能的问题
                const problems = {
                    duplicatePositions: [],
                    emptyNames: [],
                    nullValues: [],
                    validRecords: []
                };
                
                // 检查重复位置
                const positionCounts = {};
                members.forEach(member => {
                    const pos = member.position_id;
                    if (pos) {
                        positionCounts[pos] = (positionCounts[pos] || 0) + 1;
                    }
                });
                
                // 详细分析每条记录
                members.forEach((member, index) => {
                    console.log(`\n=== 记录 ${index + 1} 分析 ===`);
                    console.log('完整记录:', member);
                    
                    // 检查字段值
                    const name = member.member_name;
                    const position = member.position_id;
                    const teamKey = member.team_key;
                    
                    console.log('字段检查:');
                    console.log('  member_name:', name, `(类型: ${typeof name}, 长度: ${name ? name.length : 0})`);
                    console.log('  position_id:', position, `(类型: ${typeof position})`);
                    console.log('  team_key:', teamKey, `(类型: ${typeof teamKey})`);
                    
                    // 检查问题
                    if (!name || name.trim() === '') {
                        problems.emptyNames.push(member);
                        console.log('  ❌ 问题: 队员姓名为空');
                    } else if (positionCounts[position] > 1) {
                        problems.duplicatePositions.push(member);
                        console.log('  ❌ 问题: 位置重复 (出现次数:', positionCounts[position], ')');
                    } else if (name === null || position === null || teamKey === null) {
                        problems.nullValues.push(member);
                        console.log('  ❌ 问题: 存在null值');
                    } else {
                        problems.validRecords.push(member);
                        console.log('  ✅ 有效记录');
                    }
                });
                
                // 总结问题
                console.log('\n=== 问题总结 ===');
                console.log('有效记录数量:', problems.validRecords.length);
                console.log('空姓名记录:', problems.emptyNames.length);
                console.log('重复位置记录:', problems.duplicatePositions.length);
                console.log('存在null值记录:', problems.nullValues.length);
                
                console.log('=== 深度分析结束 ===');
                
            } catch (error) {
                console.error('深度分析异常:', error);
            }
        };
        
        // 调试函数：测试萧门进度计算
        window.testXiaomenProgress = async function() {
            console.log('=== 测试萧门进度计算 ===');
            
            try {
                // 先查询数据库中的实际记录数量
                const { data: members, error } = await supabase
                    .from('team_members')
                    .select('*')
                    .eq('team_key', 'xiaomen');
                
                if (error) {
                    console.error('查询萧门数据失败:', error);
                    return;
                }
                
                console.log(`数据库查询结果: ${members.length} 条记录`);
                
                // 统计有效记录数量
                const validMembers = members.filter(member => {
                    const hasValidName = member.member_name && member.member_name.trim() !== '';
                    const hasValidPosition = member.position_id && member.position_id.trim() !== '';
                    const hasValidTeamKey = member.team_key && member.team_key.trim() !== '';
                    return hasValidName || hasValidPosition || hasValidTeamKey;
                });
                
                console.log(`有效队员数量: ${validMembers.length} 人`);
                
                // 直接调用getTeamMemberCount函数测试萧门进度
                const xiaomenCount = await getTeamMemberCount('xiaomen');
                console.log(`萧门队伍最终队员数量: ${xiaomenCount}/10`);
                console.log(`计算过程: ${validMembers.length} (数据库有效记录) + 1 (固定队长萧司余) = ${xiaomenCount}`);
                
                // 显示当前进度条状态
                const progressBar = document.getElementById('xiaomen-progress-bar');
                const progressText = document.getElementById('xiaomen-progress-text');
                
                if (progressBar && progressText) {
                    console.log('当前进度条显示:');
                    console.log('  进度条宽度:', progressBar.style.width);
                    console.log('  进度文本:', progressText.textContent);
                }
                
                console.log('=== 萧门进度测试结束 ===');
                
            } catch (error) {
                console.error('测试萧门进度异常:', error);
            }
        };
        
        // 定期刷新进度数据（每30秒）
        setInterval(async () => {
            try {
                await loadProgressFromStorage();
                Object.keys(teamProgress).forEach(team => {
                    updateProgressDisplay(team);
                });
                console.log('进度数据已自动刷新');
            } catch (error) {
                console.warn('自动刷新进度数据失败:', error);
            }
        }, 30000);
    </script>
