<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建新队伍 - 梳风弄弦音</title>
    <style>
        /* 阿里妈妈东方大楷字体声明 */
        @font-face {
            font-family: 'AlimamaDongFangDaKai';
            src: url('fonts/AlimamaDongFangDaKai-Regular.otf') format('opentype'),
                 url('fonts/AlimamaDongFangDaKai-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* 重置样式和基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AlimamaDongFangDaKai', "SimHei", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f9f7f3;
            color: #5a4b38;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 布局容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            min-height: 100vh;
        }

        /* 页面头部样式 */
        .page-header {
            text-align: center;
            padding: 40px 0 25px;
            border-bottom: 1px solid #e0d8c8;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2rem;
            color: #5a4b38;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .team-name {
            font-size: 1rem;
            color: #8a7d6b;
            opacity: 0.8;
        }

        /* 队伍信息设置区域 */
        .team-info-section {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #e0d8c8;
            box-shadow: 0 2px 8px rgba(154, 136, 104, 0.1);
        }

        .section-title {
            font-size: 1.3rem;
            color: #5a4b38;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #9a8868;
        }

        .team-input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 0.95rem;
            color: #8a7d6b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .team-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0d8c8;
            border-radius: 6px;
            font-size: 1rem;
            background: #fefbf7;
            outline: none;
            color: #5a4b38;
            transition: all 0.3s ease;
        }

        .team-input:focus {
            border-color: #9a8868;
            box-shadow: 0 0 0 2px rgba(154, 136, 104, 0.1);
        }

        .input-hint {
            font-size: 0.8rem;
            color: #b09c80;
            margin-top: 4px;
            font-style: italic;
        }

        /* 队伍信息头部样式 */
        .team-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #9a8868;
        }

        /* 打本信息头部样式 */
        .raid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #9a8868;
        }

        .section-title {
            font-size: 1.1rem;
            color: #5a4b38;
            font-weight: 500;
        }

        .header-save-btn {
            padding: 8px 20px;
            background-color: #9a8868;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            margin-left: 12px;
        }

        .header-save-btn:hover {
            background-color: #867352;
            transform: translateY(-1px);
        }

        /* 打本信息栏样式 */
        .raid-info {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e0d8c8;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(154, 136, 104, 0.1);
        }

        .info-item {
            flex: 1;
            min-width: 160px;
        }

        .info-label {
            display: block;
            font-size: 0.85rem;
            color: #8a7d6b;
            margin-bottom: 5px;
            font-weight: 500;
        }

        /* 表单控件样式 */
        .day-select, .time-select, .copy-select, .remark-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0d8c8;
            border-radius: 6px;
            font-size: 0.95rem;
            background: #fefbf7;
            outline: none;
            color: #5a4b38;
            transition: all 0.3s ease;
        }

        .day-select:focus, .time-select:focus, .copy-select:focus, .remark-input:focus {
            border-color: #9a8868;
            box-shadow: 0 0 0 2px rgba(154, 136, 104, 0.1);
        }

        /* 队员填写区域 */
        .member-fill-section {
            margin-top: 30px;
        }

        /* 列表项样式 */
        .item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 12px 16px;
            background: #fff;
            border-radius: 6px;
            border: 1px solid #e0d8c8;
            transition: all 0.3s ease;
            box-shadow: 0 1px 3px rgba(154, 136, 104, 0.1);
        }

        .item:hover {
            box-shadow: 0 2px 8px rgba(154, 136, 104, 0.15);
            transform: translateY(-1px);
        }

        .prefix {
            width: 80px;
            font-size: 0.95rem;
            color: #5a4b38;
            font-weight: 500;
            flex-shrink: 0;
        }

        .fixed-text {
            font-size: 0.95rem;
            color: #5a4b38;
            padding: 4px 0;
        }

        .input-box {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e0d8c8;
            border-radius: 4px;
            font-size: 0.95rem;
            background: #fefbf7;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            border-color: #9a8868;
            box-shadow: 0 0 0 2px rgba(154, 136, 104, 0.1);
        }

        /* 按钮样式 */
        .btn {
            margin-left: 8px;
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 60px;
        }

        .save-btn {
            background: #9a8868;
            color: #fff;
        }

        .save-btn:hover {
            background: #867352;
            transform: translateY(-1px);
        }

        .del-btn {
            background: #c9b89f;
            color: #fff;
        }

        .del-btn:hover {
            background: #b8a792;
            transform: translateY(-1px);
        }

        /* 提示框样式 */
        .alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: #d64141;
            color: white;
            border-radius: 6px;
            z-index: 9999;
            display: none;
            animation: fadeInOut 3s ease;
            box-shadow: 0 4px 12px rgba(214, 65, 65, 0.3);
            font-size: 0.9rem;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; top: 10px; transform: translateX(-50%) scale(0.9); }
            10% { opacity: 1; top: 20px; transform: translateX(-50%) scale(1); }
            80% { opacity: 1; top: 20px; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; top: 10px; transform: translateX(-50%) scale(0.9); }
        }

        /* 连接状态指示器 */
        .connection-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 9999;
            background: #FF9800;
            color: white;
            box-shadow: 0 2px 6px rgba(255, 152, 0, 0.3);
            transition: all 0.3s ease;
        }

        .connection-status.success {
            background: #4CAF50;
            box-shadow: 0 2px 6px rgba(76, 175, 80, 0.3);
        }

        .connection-status.error {
            background: #f44336;
            box-shadow: 0 2px 6px rgba(244, 67, 54, 0.3);
        }

        /* 进度指示器 */
        .progress-indicator {
            position: fixed;
            bottom: 50px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 9999;
            background: #9a8868;
            color: white;
            box-shadow: 0 2px 6px rgba(154, 136, 104, 0.3);
            transition: all 0.3s ease;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
            
            .page-header {
                padding: 30px 0 20px;
            }
            
            .page-title {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            
            .raid-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .header-save-btn {
                margin-left: 0;
                margin-top: 8px;
                width: auto;
                min-width: 100px;
                align-self: flex-end;
            }
            
            .raid-info {
                flex-direction: column;
                gap: 10px;
                padding: 12px 16px;
            }

            .info-item {
                min-width: 100%;
            }

            .item {
                flex-wrap: wrap;
                padding: 10px 12px;
            }
            
            .prefix {
                width: 60px;
                margin-bottom: 6px;
                font-size: 0.9rem;
            }
            
            .input-box {
                width: 100%;
                margin-bottom: 6px;
            }
            
            .btn {
                margin-left: 0;
                margin-right: 6px;
                margin-top: 6px;
                font-size: 0.8rem;
                padding: 5px 10px;
                min-width: 50px;
            }
            
            .team-info-section {
                padding: 16px;
            }

            .section-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 10px;
            }
            
            .page-header {
                padding: 20px 0 15px;
            }
            
            .page-title {
                font-size: 1.4rem;
            }
            
            .raid-info {
                gap: 8px;
                padding: 10px 12px;
            }
            
            .info-label {
                font-size: 0.8rem;
            }
            
            .day-select, .time-select, .copy-select, .remark-input {
                padding: 6px 8px;
                font-size: 0.9rem;
                height: 36px;
            }
            
            .item {
                padding: 8px 10px;
            }
            
            .prefix {
                width: 50px;
                font-size: 0.85rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 4px 8px;
                min-width: 45px;
            }
        }

        /* 加载动画 */
        .loading {
            opacity: 0.7;
            pointer-events: none;
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #9a8868;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 成功状态样式 */
        .success-state {
            background-color: #e8f5e9;
            border-color: #4CAF50;
        }

        .success-state .prefix,
        .success-state .fixed-text {
            color: #2e7d32;
        }

        /* 错误状态样式 */
        .error-state {
            background-color: #ffebee;
            border-color: #f44336;
        }

        .error-state .prefix,
        .error-state .fixed-text {
            color: #c62828;
        }

        /* 悬停效果增强 */
        .btn:active {
            transform: translateY(1px);
        }

        .item:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">创建新队伍</h1>
            <div class="team-name">请填写队伍信息</div>
        </div>

        <!-- 队伍信息设置区域 -->
        <div class="team-info-section">
            <div class="team-info-header">
                <h2 class="section-title">队伍基本信息</h2>
                <button class="header-save-btn" id="teamInfoSaveBtn">保存设置</button>
            </div>
            
            <div class="team-input-group">
                <label class="input-label">队伍名称</label>
                <input type="text" class="team-input" id="teamNameInput" placeholder="请输入队伍名称（如：萧门、千瑶等）" maxlength="20">
                <div class="input-hint">最多20个字符，建议使用简短易记的名称</div>
            </div>
            
            <div class="team-input-group">
                <label class="input-label">队长姓名</label>
                <input type="text" class="team-input" id="leaderNameInput" placeholder="请输入队长姓名" maxlength="10">
                <div class="input-hint">队长的姓名，将在页面中显示</div>
            </div>
        </div>

        <!-- 提示框 -->
        <div class="alert" id="alertBox">该位置已经被填写！请在下方重新填写。</div>

        <!-- 打本信息栏（队长行上方） -->
        <div class="raid-header">
            <div class="raid-title">本栏仅队长填写，保存生效</div>
            <button class="header-save-btn" id="headerSaveBtn">保存设置</button>
        </div>
        
        <div class="raid-info" id="raidInfo">
            <!-- 星期选择器 -->
            <div class="info-item">
                <label class="info-label">选择星期</label>
                <select class="day-select" id="daySelector">
                    <option value="周一">周一</option>
                    <option value="周二">周二</option>
                    <option value="周三">周三</option>
                    <option value="周四">周四</option>
                    <option value="周五">周五</option>
                    <option value="周六">周六</option>
                    <option value="周日">周日</option>
                </select>
            </div>

            <!-- 打本时间选择器 -->
            <div class="info-item">
                <label class="info-label">打本时间</label>
                <select class="time-select" id="timeSelector">
                    <!-- 由JavaScript动态生成 -->
                </select>
            </div>

            <!-- 副本选择下拉菜单 -->
            <div class="info-item">
                <label class="info-label">副本选择</label>
                <select class="copy-select" id="copySelector">
                    <option value="双十">双十</option>
                    <option value="开荒">开荒</option>
                </select>
            </div>

            <!-- 备注输入框 -->
            <div class="info-item">
                <label class="info-label">队长有什么想说的吗：</label>
                <input type="text" class="remark-input" id="remarkInput" placeholder="请输入">
            </div>
        </div>

        <div class="raid-header" style="margin-top: 30px;">
            <div class="raid-title">队员填写，保存生效</div>
            <button class="header-save-btn" id="clearAllBtn">一键清空</button>
        </div>

        <!-- 队长（可编辑） -->
        <div class="item" id="leaderItem">
            <div class="prefix">队长</div>
            <input type="text" class="input-box" id="leaderInput" placeholder="请队长填写自己的名字" value="">
            <button class="btn save-btn" id="leaderSaveBtn">保存</button>
            <button class="btn del-btn" id="leaderDelBtn" style="display: none;">删除</button>
        </div>

        <!-- 队员 1-7、纯奶位 1-2 -->
        <div class="item" data-id="member1">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="member2">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="member3">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="member4">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="member5">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="member6">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="member7">
            <div class="prefix">队员</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="milk1">
            <div class="prefix">纯奶位</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
        <div class="item" data-id="milk2">
            <div class="prefix">纯奶位</div>
            <input type="text" class="input-box" placeholder="请队员自行填写后保存">
            <button class="btn save-btn">保存</button>
            <button class="btn del-btn" style="display: none;">删除</button>
        </div>
    </div>

        <script>
        // 配置常量
        const CONFIG = {
            maxTeamNameLength: 20,
            maxLeaderNameLength: 10,
            maxMemberNameLength: 15,
            alertDuration: 3000,
            saveFeedbackDuration: 3000,
            autoSaveDelay: 2000,
            connectionCheckInterval: 5000,
            progressUpdateInterval: 5000
        };

        // 存储键常量
        const STORAGE_KEYS = {
            team: 'newteam',
            raidSettings: 'newteam_raid_settings',
            teamInfo: 'newteam_team_info',
            memberData: 'newteam_member_data'
        };

        // 全局状态管理
        const appState = {
            filledPositions: {},
            isConnected: navigator.onLine,
            autoSaveTimer: null,
            connectionCheckTimer: null,
            progressUpdateTimer: null
        };

        // 工具函数：显示提示信息
        function showAlert(message, type = 'error') {
            let alertBox = document.getElementById('alertBox');
            if (!alertBox) {
                alertBox = document.createElement('div');
                alertBox.id = 'alertBox';
                alertBox.className = 'alert';
                document.body.appendChild(alertBox);
            }
            
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            alertBox.style.background = type === 'success' ? '#4CAF50' : 
                                      type === 'warning' ? '#FF9800' : '#d64141';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, CONFIG.alertDuration);
        }

        // 工具函数：验证输入
        function validateInput(input, fieldName, maxLength) {
            const value = input.value.trim();
            
            if (!value) {
                showAlert(`请输入${fieldName}！`, 'warning');
                input.focus();
                return false;
            }
            
            if (value.length > maxLength) {
                showAlert(`${fieldName}不能超过${maxLength}个字符！`, 'error');
                input.focus();
                return false;
            }
            
            // 检查特殊字符
            const specialChars = /[<>\/\\]/;
            if (specialChars.test(value)) {
                showAlert(`${fieldName}不能包含特殊字符！`, 'error');
                input.focus();
                return false;
            }
            
            return true;
        }

        // 工具函数：保存到本地存储
        function saveToLocalStorage(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify(data));
                return true;
            } catch (error) {
                console.error('保存数据失败:', error);
                showAlert('保存失败，请检查浏览器存储空间！', 'error');
                return false;
            }
        }

        // 工具函数：从本地存储读取数据
        function loadFromLocalStorage(key) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : null;
            } catch (error) {
                console.error('读取数据失败:', error);
                return null;
            }
        }

        // 工具函数：清除本地存储数据
        function clearLocalStorage(key) {
            try {
                localStorage.removeItem(key);
                return true;
            } catch (error) {
                console.error('清除数据失败:', error);
                return false;
            }
        }

        // 工具函数：生成唯一ID
        function generateUniqueId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // 工具函数：防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 工具函数：节流函数
        function throttle(func, limit) {
            let inThrottle;
            return function(...args) {
                if (!inThrottle) {

        // 业务逻辑：时间选项生成器
        class TimeOptionGenerator {
            constructor() {
                this.defaultOptions = ['百业派对后', '19:00', '20:00', '21:00', '22:00'];
                this.timeIntervals = this.generateTimeIntervals();
            }

            // 生成时间间隔选项
            generateTimeIntervals() {
                const intervals = [];
                for (let hour = 0; hour <= 24; hour++) {
                    for (let minute of [0, 30]) {
                        if (hour === 24 && minute === 30) break;
                        const timeStr = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                        intervals.push(timeStr);
                    }
                }
                return intervals;
            }

            // 生成时间选择器选项
            generateTimeOptions() {
                const timeSelector = document.getElementById('timeSelector');
                if (!timeSelector) return;
                
                timeSelector.innerHTML = '';
                
                // 添加默认选项
                this.defaultOptions.forEach(option => {
                    this.addOption(timeSelector, option, option, true);
                });
                
                // 添加分隔线
                this.addSeparator(timeSelector);
                
                // 添加时间间隔选项
                this.timeIntervals.forEach(time => {
                    this.addOption(timeSelector, time, time, false);
                });
            }

            // 添加选项
            addOption(selector, value, text, isDefault = false) {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = text;
                option.selected = isDefault;
                selector.appendChild(option);
            }

            // 添加分隔线
            addSeparator(selector) {
                const separator = document.createElement('option');
                separator.disabled = true;
                separator.textContent = '──────────';
                selector.appendChild(separator);
            }
        }

                        const input = item.querySelector('.input-box');
                        const saveBtn = item.querySelector('.save-btn');
                        const delBtn = item.querySelector('.del-btn');
                        
                        if (input && saveBtn && delBtn) {
                            if (data.status === 'filled') {
                                const fixedText = document.createElement('div');
                                fixedText.className = 'fixed-text';
                                fixedText.textContent = data.name;
                                input.replaceWith(fixedText);
                                
                                saveBtn.style.display = 'none';
                                delBtn.style.display = 'inline-block';
                            } else {
                                input.value = data.name;
                            }
                        }
                    }
                });
            }
        }

        // 加载保存的打本信息
        function loadRaidInfo() {
            const savedInfo = loadFromLocalStorage(RAID_SETTINGS_KEY);
            if (savedInfo) {
                if (savedInfo.day) {
                    const daySelector = document.getElementById('daySelector');
                    if (daySelector) daySelector.value = savedInfo.day;
                }
                if (savedInfo.time) {
                    const timeSelector = document.getElementById('timeSelector');
                    if (timeSelector) timeSelector.value = savedInfo.time;
                }
                if (savedInfo.copy) {
                    const copySelector = document.getElementById('copySelector');
                    if (copySelector) copySelector.value = savedInfo.copy;
                }
                if (savedInfo.remark) {
                    const remarkInput = document.getElementById('remarkInput');
                    if (remarkInput) remarkInput.value = savedInfo.remark;
                }
            } else {
                // 默认设置：周一 21:00 双十
                const daySelector = document.getElementById('daySelector');
                const timeSelector = document.getElementById('timeSelector');
                const copySelector = document.getElementById('copySelector');
                
                if (daySelector) daySelector.value = '周一';
                if (timeSelector) timeSelector.value = '21:00';
                if (copySelector) copySelector.value = '双十';
            }
        }

        // 加载保存的队伍信息
        function loadTeamInfo() {
            const savedTeamInfo = loadFromLocalStorage(TEAM_INFO_KEY);
            if (savedTeamInfo) {
                if (savedTeamInfo.teamName) {
                    const teamNameInput = document.getElementById('teamNameInput');
                    if (teamNameInput) teamNameInput.value = savedTeamInfo.teamName;
                    
                    // 更新页面标题显示
                    const teamNameDisplay = document.querySelector('.team-name');
                    if (teamNameDisplay) {
                        teamNameDisplay.textContent = `队伍：${savedTeamInfo.teamName}`;
                    }
                }
                if (savedTeamInfo.leaderName) {
                    const leaderNameInput = document.getElementById('leaderNameInput');
                    if (leaderNameInput) leaderNameInput.value = savedTeamInfo.leaderName;
                }
            }
        }

        // 保存队伍信息
        function saveTeamInfo() {
            const teamNameInput = document.getElementById('teamNameInput');
            const leaderNameInput = document.getElementById('leaderNameInput');
            
            if (!teamNameInput || !leaderNameInput) return;
            
            const teamName = teamNameInput.value.trim();
            const leaderName = leaderNameInput.value.trim();
            
            if (!validateInput(teamNameInput, '队伍名称', CONFIG.maxTeamNameLength)) return;
            if (!validateInput(leaderNameInput, '队长姓名', CONFIG.maxLeaderNameLength)) return;
            
            const teamInfo = {
                teamName: teamName,
                leaderName: leaderName
            };
            
            if (!saveToLocalStorage(TEAM_INFO_KEY, teamInfo)) return;
            
            // 更新页面标题显示
            const teamNameDisplay = document.querySelector('.team-name');
            if (teamNameDisplay) {
                teamNameDisplay.textContent = `队伍：${teamName}`;
            }
            
            // 更新队长输入框的值
            const leaderInput = document.getElementById('leaderInput');
            if (leaderInput) leaderInput.value = leaderName;
            
            showAlert('队伍信息已保存！', 'success');
        }

        // 保存打本设置
        function saveRaidSettings() {
            // 先保存队伍信息
            const teamNameInput = document.getElementById('teamNameInput');
            const leaderNameInput = document.getElementById('leaderNameInput');
            
            if (!teamNameInput || !leaderNameInput) return;
            
            const teamName = teamNameInput.value.trim();
            const leaderName = leaderNameInput.value.trim();
            
            if (!teamName || !leaderName) {
                showAlert('请先填写队伍名称和队长姓名！');
                return;
            }
            
            // 保存队伍信息
            const teamInfo = {
                teamName: teamName,
                leaderName: leaderName
            };
            if (!saveToLocalStorage(TEAM_INFO_KEY, teamInfo)) return;
            
            // 更新页面标题显示
            const teamNameDisplay = document.querySelector('.team-name');
            if (teamNameDisplay) {
                teamNameDisplay.textContent = `队伍：${teamName}`;
            }
            
            // 保存打本设置
            const raidSettings = {
                day: document.getElementById('daySelector')?.value || '周一',
                time: document.getElementById('timeSelector')?.value || '21:00',
                copy: document.getElementById('copySelector')?.value || '双十',
                remark: document.getElementById('remarkInput')?.value || ''
            };
            
            if (!saveToLocalStorage(RAID_SETTINGS_KEY, raidSettings)) return;
            
            // 视觉反馈效果
            const saveBtn = document.getElementById('headerSaveBtn');
            if (saveBtn) {
                const originalText = saveBtn.textContent;
                const originalBackground = saveBtn.style.backgroundColor;
                
                saveBtn.textContent = "已保存";
                saveBtn.style.backgroundColor = "#e8f5e9";
                
                setTimeout(() => {
                    saveBtn.textContent = originalText;
                    saveBtn.style.backgroundColor = originalBackground;
                }, CONFIG.saveFeedbackDuration);
            }
            
            showAlert('所有设置已保存！', 'success');
        }

        // 保存队员功能
        function handleSave(event) {
            const btn = event.target;
            const item = btn.closest('.item');
            if (!item) return;
            
            const input = item.querySelector('.input-box');
            const delBtn = item.querySelector('.del-btn');
            const positionId = item.dataset.id;

            if (!input || !delBtn || !positionId) return;

            const name = input.value.trim();
            if (!validateInput(input, '队员姓名', CONFIG.maxMemberNameLength)) return;

            if (filledPositions[positionId]) {
                showAlert('该位置已经被填写！请在下方重新填写。');
                input.value = '';
                return;
            }

            filledPositions[positionId] = name;

            const fixedText = document.createElement('div');
            fixedText.className = 'fixed-text';
            fixedText.textContent = name;
            input.replaceWith(fixedText);

            btn.style.display = 'none';
            delBtn.style.display = 'inline-block';

            saveToLocalStorage(`${TEAM_KEY}_${positionId}`, name);
            showAlert('队员信息已保存！', 'success');
        }

        // 删除队员功能
        function handleDelete(event) {
            const btn = event.target;
            const item = btn.closest('.item');
            if (!item) return;
            
            const fixedText = item.querySelector('.fixed-text');
            const saveBtn = item.querySelector('.save-btn');
            const positionId = item.dataset.id;

            if (!fixedText || !saveBtn || !positionId) return;

            delete filledPositions[positionId];

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'input-box';
            input.placeholder = '请队员自行填写后保存';
            fixedText.replaceWith(input);

            btn.style.display = 'none';
            saveBtn.style.display = 'inline-block';

            localStorage.removeItem(`${TEAM_KEY}_${positionId}`);
            showAlert('队员信息已删除！', 'success');
        }

        // 清空所有队员填写的内容
        function clearAllInputs() {
            if (!confirm('确定要清空所有队员填写的内容吗？此操作不可撤销。')) {
                return;
            }
            
            const items = document.querySelectorAll('.item');
            
            items.forEach(item => {
                const positionId = item.dataset.id;
                
                // 仅处理队员和奶位（有data-id的项且不是队长）
                if (positionId && (positionId.startsWith('member') || positionId.startsWith('milk'))) {
                    localStorage.removeItem(`${TEAM_KEY}_${positionId}`);
                    
                    delete filledPositions[positionId];
                    
                    const inputBox = item.querySelector('.input-box');
                    if (inputBox) {
                        inputBox.value = '';
                    }
                    
                    const fixedText = item.querySelector('.fixed-text');
                    if (fixedText) {
                        const newInput = document.createElement('input');
                        newInput.type = 'text';
                        newInput.className = 'input-box';
                        newInput.placeholder = '请队员自行填写后保存';
                        
                        fixedText.replaceWith(newInput);
                        
                        const saveBtn = item.querySelector('.save-btn');
                        const delBtn = item.querySelector('.del-btn');
                        if (saveBtn) saveBtn.style.display = 'inline-block';
                        if (delBtn) delBtn.style.display = 'none';
                    }
                }
            });
            
            showAlert('所有队员填写的内容已清空！', 'success');
        }

        // 初始化事件监听
        function initEventListeners() {
            // 绑定保存按钮事件
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', handleSave);
            });
            
            // 绑定删除按钮事件
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', handleDelete);
            });

            // 绑定打本设置保存按钮事件
            const headerSaveBtn = document.getElementById('headerSaveBtn');
            if (headerSaveBtn) {
                headerSaveBtn.addEventListener('click', saveRaidSettings);
            }
            
            // 绑定一键清空按钮事件
            const clearAllBtn = document.getElementById('clearAllBtn');
            if (clearAllBtn) {
                clearAllBtn.addEventListener('click', clearAllInputs);
            }
            
            // 绑定队长保存按钮事件
            const leaderSaveBtn = document.getElementById('leaderSaveBtn');
            if (leaderSaveBtn) {
                leaderSaveBtn.addEventListener('click', function() {
                    const leaderInput = document.getElementById('leaderInput');
                    if (!leaderInput) return;
                    
                    const leaderName = leaderInput.value.trim();
                    if (!validateInput(leaderInput, '队长姓名', CONFIG.maxLeaderNameLength)) return;
                    
                    // 更新队伍信息中的队长姓名
                    const teamInfo = loadFromLocalStorage(TEAM_INFO_KEY) || {};
                    teamInfo.leaderName = leaderName;
                    saveToLocalStorage(TEAM_INFO_KEY, teamInfo);
                    
                    // 转换为固定文本
                    const fixedText = document.createElement('div');
                    fixedText.className = 'fixed-text';
                    fixedText.textContent = leaderName;
                    leaderInput.replaceWith(fixedText);
                    
                    const leaderDelBtn = document.getElementById('leaderDelBtn');
                    if (leaderDelBtn) leaderDelBtn.style.display = 'inline-block';
                    leaderSaveBtn.style.display = 'none';
                    
                    // 也更新队伍基本信息中的队长姓名
                    const leaderNameInput = document.getElementById('leaderNameInput');
                    if (leaderNameInput) leaderNameInput.value = leaderName;
                    
                    showAlert('队长信息已保存！', 'success');
                });
            }
            
            // 绑定队长删除按钮事件
            const leaderDelBtn = document.getElementById('leaderDelBtn');
            if (leaderDelBtn) {
                leaderDelBtn.addEventListener('click', function() {
                    const leaderItem = document.getElementById('leaderItem');
                    if (!leaderItem) return;
                    
                    const fixedText = leaderItem.querySelector('.fixed-text');
                    if (!fixedText) return;
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'input-box';
                    input.id = 'leaderInput';
                    input.placeholder = '请队长填写自己的名字';
                    fixedText.replaceWith(input);
                    
                    leaderSaveBtn.style.display = 'inline-block';
                    leaderDelBtn.style.display = 'none';
                    
                    showAlert('队长信息已删除！', 'success');
                });
            }
        }

        // 页面加载时恢复已保存的数据
        function restoreSavedData() {
            // 恢复队伍信息
            loadTeamInfo();
            
            // 恢复打本信息
            loadRaidInfo();
            
            // 恢复队长信息
            const savedTeamInfo = loadFromLocalStorage(TEAM_INFO_KEY);
            if (savedTeamInfo && savedTeamInfo.leaderName) {
                const leaderInput = document.getElementById('leaderInput');
                const leaderSaveBtn = document.getElementById('leaderSaveBtn');
                const leaderDelBtn = document.getElementById('leaderDelBtn');
                
                if (leaderInput && leaderSaveBtn && leaderDelBtn) {
                    const fixedText = document.createElement('div');
                    fixedText.className = 'fixed-text';
                    fixedText.textContent = savedTeamInfo.leaderName;
                    leaderInput.replaceWith(fixedText);
                    
                    leaderSaveBtn.style.display = 'none';
                    leaderDelBtn.style.display = 'inline-block';
                }
            }
            
            // 恢复队员/奶位数据
            document.querySelectorAll('.item').forEach(item => {
                const positionId = item.dataset.id;
                if (!positionId) return; // 跳过队长项
                
                const savedName = localStorage.getItem(`${TEAM_KEY}_${positionId}`);
                
                if (savedName) {
                    filledPositions[positionId] = savedName;
                    const input = item.querySelector('.input-box');
                    const saveBtn = item.querySelector('.save-btn');
                    const delBtn = item.querySelector('.del-btn');

                    if (input && saveBtn && delBtn) {
                        const fixedText = document.createElement('div');
                        fixedText.className = 'fixed-text';
                        fixedText.textContent = savedName;
                        input.replaceWith(fixedText);

                        saveBtn.style.display = 'none';
                        delBtn.style.display = 'inline-block';
                    }
                }
            });
        }

        // 业务逻辑：页面初始化器
        class PageInitializer {
            constructor() {
                this.dataManager = null;
                this.timeGenerator = null;
                this.connectionStatus = null;
                this.progressIndicator = null;
            }

            // 初始化页面
            initialize() {
                try {
                    this.generateTimeOptions();
                    this.initEventListeners();
                    this.restoreSavedData();
                    this.initDataManager();
                    this.createStatusIndicators();
                    this.setupPeriodicUpdates();
                    this.setupErrorHandling();
                    
                    console.log('页面初始化完成');
                } catch (error) {
                    console.error('页面初始化失败:', error);
                    showAlert('页面初始化失败，请刷新重试！', 'error');
                }
            }

            // 生成时间选项
            generateTimeOptions() {
                this.timeGenerator = new TimeOptionGenerator();
                this.timeGenerator.generateTimeOptions();
            }

            // 初始化事件监听器
            initEventListeners() {
                this.setupSaveEventListeners();
                this.setupDeleteEventListeners();
                this.setupFormEventListeners();
                this.setupClearEventListeners();
            }

            // 设置保存事件监听器
            setupSaveEventListeners() {
                document.querySelectorAll('.save-btn').forEach(btn => {
                    btn.addEventListener('click', this.handleSave.bind(this));
                });

                const headerSaveBtn = document.getElementById('headerSaveBtn');
                if (headerSaveBtn) {
                    headerSaveBtn.addEventListener('click', this.saveRaidSettings.bind(this));
                }

                const teamInfoSaveBtn = document.getElementById('teamInfoSaveBtn');
                if (teamInfoSaveBtn) {
                    teamInfoSaveBtn.addEventListener('click', this.saveTeamInfo.bind(this));
                }
            }

            // 设置删除事件监听器
            setupDeleteEventListeners() {
                document.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', this.handleDelete.bind(this));
                });
            }

            // 设置表单事件监听器
            setupFormEventListeners() {
                const clearAllBtn = document.getElementById('clearAllBtn');
                if (clearAllBtn) {
                    clearAllBtn.addEventListener('click', this.clearAllInputs.bind(this));
                }
            }

            // 设置清空事件监听器
            setupClearEventListeners() {
                const teamNameInput = document.getElementById('teamNameInput');
                const leaderNameInput = document.getElementById('leaderNameInput');
                
                if (teamNameInput) {
                    teamNameInput.addEventListener('input', throttle(() => {
                        this.updateTeamNameDisplay();
                    }, 500));
                }
                
                if (leaderNameInput) {
                    leaderNameInput.addEventListener('input', throttle(() => {
                        this.updateLeaderDisplay();
                    }, 500));
                }
            }

            // 初始化数据管理器
            initDataManager() {
                this.dataManager = new DataManager();
                
                // 订阅管理器事件
                this.dataManager.subscribe((eventType, data) => {
                    console.log(`数据管理器事件: ${eventType}`, data);
                    
                    switch (eventType) {
                        case 'autosave':
                            console.log('数据已自动保存');
                            break;
                        case 'connection':
                            showAlert(`网络连接${data.status === 'online' ? '恢复' : '中断'}`, 
                                     data.status === 'online' ? 'success' : 'warning');
                            break;
                        case 'dataImported':
                            showAlert('数据导入成功！', 'success');
                            break;
                    }
                });
            }

            // 创建状态指示器
            createStatusIndicators() {
                this.createConnectionStatusIndicator();
                this.createProgressIndicator();
            }

            // 创建连接状态指示器
            createConnectionStatusIndicator() {
                this.connectionStatus = document.createElement('div');
                this.connectionStatus.className = 'connection-status success';
                this.connectionStatus.textContent = '✓ 连接正常';
                document.body.appendChild(this.connectionStatus);
            }

            // 创建进度指示器
            createProgressIndicator() {
                this.progressIndicator = document.createElement('div');
                this.progressIndicator.className = 'progress-indicator';
                this.progressIndicator.style.cssText = `
                    position: fixed;
                    bottom: 40px;
                    right: 10px;
                    padding: 5px 10px;
                    border-radius: 4px;
                    font-size: 12px;
                    background: #9a8868;
                    color: white;
                    z-index: 9999;
                    box-shadow: 0 2px 6px rgba(154, 136, 104, 0.3);
                `;
                document.body.appendChild(this.progressIndicator);
            }

            // 设置定期更新
            setupPeriodicUpdates() {
                // 初始更新进度
                this.updateProgress();
                
                // 定期更新进度
                setInterval(() => this.updateProgress(), CONFIG.progressUpdateInterval);
                
                // 监听数据变化更新进度
                this.dataManager.subscribe(() => {
                    this.updateProgress();
                });
            }

            // 设置错误处理
            setupErrorHandling() {
                window.addEventListener('error', (event) => {
                    console.error('页面错误:', event.error);
                    showAlert('页面出现错误，请刷新重试！', 'error');
                });

                window.addEventListener('unhandledrejection', (event) => {
                    console.error('未处理的Promise拒绝:', event.reason);
                    showAlert('页面出现错误，请刷新重试！', 'error');
                });
            }

            // 恢复保存的数据
            restoreSavedData() {
                this.restoreTeamInfo();
                this.restoreRaidInfo();
                this.restoreMemberData();
            }

            // 恢复队伍信息
            restoreTeamInfo() {
                const savedTeamInfo = loadFromLocalStorage(STORAGE_KEYS.teamInfo);
                if (savedTeamInfo) {
                    const teamNameInput = document.getElementById('teamNameInput');
                    const leaderNameInput = document.getElementById('leaderNameInput');
                    
                    if (teamNameInput && savedTeamInfo.teamName) {
                        teamNameInput.value = savedTeamInfo.teamName;
                        this.updateTeamNameDisplay();
                    }
                    
                    if (leaderNameInput && savedTeamInfo.leaderName) {
                        leaderNameInput.value = savedTeamInfo.leaderName;
                    }
                }
            }

            // 恢复打本信息
            restoreRaidInfo() {
                const savedInfo = loadFromLocalStorage(STORAGE_KEYS.raidSettings);
                if (savedInfo) {
                    const daySelector = document.getElementById('daySelector');
                    const timeSelector = document.getElementById('timeSelector');
                    const copySelector = document.getElementById('copySelector');
                    const remarkInput = document.getElementById('remarkInput');
                    
                    if (daySelector && savedInfo.day) daySelector.value = savedInfo.day;
                    if (timeSelector && savedInfo.time) timeSelector.value = savedInfo.time;
                    if (copySelector && savedInfo.copy) copySelector.value = savedInfo.copy;
                    if (remarkInput && savedInfo.remark) remarkInput.value = savedInfo.remark;
                }
            }

            // 恢复队员数据
            restoreMemberData() {
                const savedMemberData = loadFromLocalStorage(STORAGE_KEYS.memberData);
                if (savedMemberData) {
                    this.dataManager.applyMemberData(savedMemberData);
                }
            }

            // 更新队伍名称显示
            updateTeamNameDisplay() {
                const teamNameInput = document.getElementById('teamNameInput');
                const teamNameDisplay = document.querySelector('.team-name');
                
                if (teamNameInput && teamNameDisplay) {
                    const teamName = teamNameInput.value.trim();
                    teamNameDisplay.textContent = teamName ? `队伍：${teamName}` : '请填写队伍信息';
                }
            }

            // 更新队长显示
            updateLeaderDisplay() {
                const leaderNameInput = document.getElementById('leaderNameInput');
                const leaderDisplay = document.querySelector('.leader-display');
                
                if (leaderNameInput && leaderDisplay) {
                    const leaderName = leaderNameInput.value.trim();
                    leaderDisplay.textContent = leaderName ? `队长：${leaderName}` : '请填写队长姓名';
                }
            }

            // 更新进度显示
            updateProgress() {
                if (!this.dataManager || !this.progressIndicator) return;
                
                const stats = this.dataManager.getStatistics();
                this.progressIndicator.textContent = `进度: ${stats.filled}/${stats.total} (${stats.progress}%)`;
            }

            // 处理保存事件
            handleSave(event) {
                const btn = event.target;
                const item = btn.closest('.item');
                if (!item) return;
                
                const input = item.querySelector('.input-box');
                const delBtn = item.querySelector('.del-btn');
                const positionId = item.dataset.id;

                if (!input || !delBtn || !positionId) return;

                const name = input.value.trim();
                if (!validateInput(input, '队员姓名', CONFIG.maxMemberNameLength)) return;

                if (appState.filledPositions[positionId]) {
                    showAlert('该位置已经被填写！请在下方重新填写。', 'warning');
                    input.value = '';
                    return;
                }

                appState.filledPositions[positionId] = name;

                const fixedText = document.createElement('div');
                fixedText.className = 'fixed-text';
                fixedText.textContent = name;
                input.replaceWith(fixedText);

                btn.style.display = 'none';
                delBtn.style.display = 'inline-block';

                this.dataManager.saveMemberData({ [positionId]: { name, status: 'filled' } });
                showAlert('队员信息已保存！', 'success');
            }

            // 处理删除事件
            handleDelete(event) {
                const btn = event.target;
                const item = btn.closest('.item');
                if (!item) return;
                
                const fixedText = item.querySelector('.fixed-text');
                const saveBtn = item.querySelector('.save-btn');
                const positionId = item.dataset.id;

                if (!fixedText || !saveBtn || !positionId) return;

                delete appState.filledPositions[positionId];

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'input-box';
                input.placeholder = '请队员自行填写后保存';
                fixedText.replaceWith(input);

                btn.style.display = 'none';
                saveBtn.style.display = 'inline-block';

                this.dataManager.saveMemberData({ [positionId]: { name: '', status: 'empty' } });
                showAlert('队员信息已删除！', 'success');
            }

            // 保存队伍基本信息
            saveTeamInfo() {
                const teamNameInput = document.getElementById('teamNameInput');
                const leaderNameInput = document.getElementById('leaderNameInput');
                
                if (!teamNameInput || !leaderNameInput) return;
                
                const teamName = teamNameInput.value.trim();
                const leaderName = leaderNameInput.value.trim();
                
                if (!teamName) {
                    showAlert('请填写队伍名称！', 'warning');
                    teamNameInput.focus();
                    return;
                }
                
                if (!leaderName) {
                    showAlert('请填写队长姓名！', 'warning');
                    leaderNameInput.focus();
                    return;
                }
                
                if (teamName.length > CONFIG.maxTeamNameLength) {
                    showAlert(`队伍名称不能超过${CONFIG.maxTeamNameLength}个字符！`, 'error');
                    teamNameInput.focus();
                    return;
                }
                
                if (leaderName.length > CONFIG.maxLeaderNameLength) {
                    showAlert(`队长姓名不能超过${CONFIG.maxLeaderNameLength}个字符！`, 'error');
                    leaderNameInput.focus();
                    return;
                }
                
                const teamInfo = { 
                    teamName, 
                    leaderName,
                    timestamp: new Date().toISOString(),
                    version: '1.0'
                };
                
                if (!this.dataManager.saveTeamInfo(teamInfo)) return;
                
                this.updateTeamNameDisplay();
                this.updateLeaderDisplay();
                
                this.showTeamInfoSaveFeedback();
                showAlert('队伍基本信息已保存！', 'success');
            }

            // 保存打本设置
            saveRaidSettings() {
                const teamNameInput = document.getElementById('teamNameInput');
                const leaderNameInput = document.getElementById('leaderNameInput');
                
                if (!teamNameInput || !leaderNameInput) return;
                
                const teamName = teamNameInput.value.trim();
                const leaderName = leaderNameInput.value.trim();
                
                if (!teamName || !leaderName) {
                    showAlert('请先填写队伍名称和队长姓名！', 'warning');
                    return;
                }
                
                const teamInfo = { teamName, leaderName };
                if (!this.dataManager.saveTeamInfo(teamInfo)) return;
                
                this.updateTeamNameDisplay();
                
                const raidSettings = this.dataManager.getRaidSettings();
                if (!this.dataManager.saveRaidSettings(raidSettings)) return;
                
                this.showSaveFeedback();
                showAlert('所有设置已保存！', 'success');
            }

            // 显示队伍信息保存反馈
            showTeamInfoSaveFeedback() {
                const saveBtn = document.getElementById('teamInfoSaveBtn');
                if (saveBtn) {
                    const originalText = saveBtn.textContent;
                    const originalBackground = saveBtn.style.backgroundColor;
                    
                    saveBtn.textContent = "已保存";
                    saveBtn.style.backgroundColor = "#e8f5e9";
                    
                    setTimeout(() => {
                        saveBtn.textContent = originalText;
                        saveBtn.style.backgroundColor = originalBackground;
                    }, CONFIG.saveFeedbackDuration);
                }
            }

            // 显示保存反馈
            showSaveFeedback() {
                const saveBtn = document.getElementById('headerSaveBtn');
                if (saveBtn) {
                    const originalText = saveBtn.textContent;
                    const originalBackground = saveBtn.style.backgroundColor;
                    
                    saveBtn.textContent = "已保存";
                    saveBtn.style.backgroundColor = "#e8f5e9";
                    
                    setTimeout(() => {
                        saveBtn.textContent = originalText;
                        saveBtn.style.backgroundColor = originalBackground;
                    }, CONFIG.saveFeedbackDuration);
                }
            }

            // 清空所有输入
            clearAllInputs() {
                if (!confirm('确定要清空所有队员填写的内容吗？此操作不可撤销。')) return;
                
                document.querySelectorAll('.item[data-id]').forEach(item => {
                    const positionId = item.dataset.id;
                    if (positionId && (positionId.startsWith('member') || positionId.startsWith('milk'))) {
                        delete appState.filledPositions[positionId];
                        
                        const fixedText = item.querySelector('.fixed-text');
                        if (fixedText) {
                            const newInput = document.createElement('input');
                            newInput.type = 'text';
                            newInput.className = 'input-box';
                            newInput.placeholder = '请队员自行填写后保存';
                            fixedText.replaceWith(newInput);
                            
                            const saveBtn = item.querySelector('.save-btn');
                            const delBtn = item.querySelector('.del-btn');
                            if (saveBtn) saveBtn.style.display = 'inline-block';
                            if (delBtn) delBtn.style.display = 'none';
                        }
                    }
                });
                
                this.dataManager.saveMemberData({});
                showAlert('所有队员填写的内容已清空！', 'success');
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            const initializer = new PageInitializer();
            initializer.initialize();
        });
    </script>
</body>
</html>
